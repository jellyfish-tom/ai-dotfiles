name: verify

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Public-ready gate
        run: ./tools/check-public-ready.sh
      - name: Maintainer checks (no smoke)
        run: ./tools/verify-maintainer.sh --skip-smoke-test
